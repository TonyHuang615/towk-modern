version: '3.8'

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: towk-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile.dev
    container_name: towk-cms
    ports:
      - "1337:1337"
    environment:
      - HOST=0.0.0.0
      - PORT=1337
      - PUBLIC_URL=http://localhost:1337
      - APP_KEYS=towk-dev-key-1,towk-dev-key-2,towk-dev-key-3,towk-dev-key-4
      - ADMIN_JWT_SECRET=towk-admin-jwt-dev-secret
      - API_TOKEN_SALT=towk-api-token-dev-salt
      - TRANSFER_TOKEN_SALT=towk-transfer-token-dev-salt
      - JWT_SECRET=towk-jwt-dev-secret
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=towk
      - DATABASE_USERNAME=towk
      - DATABASE_PASSWORD=towk123
      - DATABASE_SSL=false
    volumes:
      - ./apps/cms:/opt/app
      - cms_node_modules:/opt/app/node_modules
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: towk-postgres
    environment:
      POSTGRES_DB: towk
      POSTGRES_USER: towk
      POSTGRES_PASSWORD: towk123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: towk-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: towk-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  cms_node_modules:
